<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EngForum — Fórum de Engenharia de Produção</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg-0:#05070a;--bg-1:#0b0f14;--bg-2:#111821;--bg-3:#172030;--emerald-300:#6ee7b7;--emerald-400:#34d399;--emerald-500:#10b981;--emerald-600:#059669;--emerald-700:#047857;--text-0:#f5f7fa;--text-1:#c9d1d9;--text-2:#8b949e;--text-3:#525c68;--border:#1f2937;--border-emerald:rgba(16,185,129,.25);--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-0);color:var(--text-1);line-height:1.6;min-height:100vh;background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(16,185,129,.12),transparent),radial-gradient(ellipse 60% 40% at 100% 100%,rgba(5,150,105,.08),transparent)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.page{display:none}.page.active{display:block}
header{position:sticky;top:0;z-index:100;background:rgba(5,7,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav{max-width:1280px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.logo{display:flex;align-items:center;gap:12px;font-weight:800;font-size:20px;cursor:pointer}
.logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--emerald-500),var(--emerald-700));display:grid;place-items:center;box-shadow:0 0 40px rgba(16,185,129,.15)}
.logo span{color:var(--emerald-400)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:14px;font-weight:500;color:var(--text-1);transition:color .2s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:var(--emerald-400)}
.nav-actions{display:flex;align-items:center;gap:12px}
.search{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--border);padding:8px 14px;border-radius:10px}
.search input{background:transparent;border:none;outline:none;color:var(--text-0);font-size:14px;width:220px}
.search input::placeholder{color:var(--text-3)}
.btn{padding:9px 18px;border-radius:10px;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--emerald-500),var(--emerald-600));color:#021a11;box-shadow:0 4px 14px rgba(16,185,129,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(16,185,129,.45)}
.btn-ghost{border:1px solid var(--border);color:var(--text-1)}
.btn-ghost:hover{border-color:var(--emerald-500);color:var(--emerald-400)}
.user-chip{display:flex;align-items:center;gap:10px;padding:6px 14px 6px 6px;background:var(--bg-2);border:1px solid var(--border);border-radius:999px;cursor:pointer}
.hero{max-width:1280px;margin:0 auto;padding:64px 24px 40px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:rgba(16,185,129,.1);border:1px solid var(--border-emerald);color:var(--emerald-400);font-size:13px;font-weight:500;margin-bottom:20px}
.hero-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--emerald-400);box-shadow:0 0 10px var(--emerald-400);animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.5}}
.hero h1{font-size:clamp(32px,5vw,56px);font-weight:800;letter-spacing:-.02em;line-height:1.1;color:var(--text-0);margin-bottom:16px}
.hero h1 .accent{background:linear-gradient(135deg,var(--emerald-300),var(--emerald-500));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{font-size:18px;color:var(--text-2);max-width:680px;margin:0 auto 32px}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.stats{max-width:1280px;margin:0 auto;padding:0 24px 48px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .25s}
.stat:hover{border-color:var(--border-emerald);transform:translateY(-2px)}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--emerald-400)}
.stat-label{font-size:13px;color:var(--text-2);margin-top:4px}
.layout{max-width:1280px;margin:0 auto;padding:0 24px 64px;display:grid;grid-template-columns:1fr 320px;gap:28px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-head h2{font-size:22px;font-weight:700;color:var(--text-0);display:flex;align-items:center;gap:10px}
.section-head h2::before{content:"";width:4px;height:22px;border-radius:2px;background:linear-gradient(180deg,var(--emerald-400),var(--emerald-700))}
.categories{display:flex;flex-direction:column;gap:12px}
.category{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;transition:all .25s;cursor:pointer}
.category:hover{border-color:var(--border-emerald);background:linear-gradient(90deg,var(--bg-1),rgba(16,185,129,.03));transform:translateX(4px)}
.cat-icon{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(16,185,129,.05));border:1px solid var(--border-emerald);display:grid;place-items:center;color:var(--emerald-400);font-size:24px}
.cat-info h3{font-size:16px;font-weight:600;color:var(--text-0);margin-bottom:4px}
.cat-info p{font-size:13px;color:var(--text-2);margin-bottom:8px}
.cat-meta{display:flex;gap:16px;font-size:12px;color:var(--text-3)}
.cat-meta strong{color:var(--text-1);font-weight:600}
.cat-stats{text-align:right;font-size:13px;color:var(--text-2);min-width:110px}
.cat-stats .num{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--emerald-400);display:block}
.topics{margin-top:40px}
.topic{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;margin-bottom:10px;transition:all .2s;cursor:pointer}
.topic:hover{border-color:var(--border-emerald);background:var(--bg-2)}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--emerald-600),var(--emerald-700));display:grid;place-items:center;font-weight:700;color:#fff;font-size:15px;border:2px solid var(--border-emerald);flex-shrink:0}
.topic-info h4{font-size:15px;font-weight:600;color:var(--text-0);margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.tag-hot{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.tag-new{background:rgba(16,185,129,.15);color:var(--emerald-400);border:1px solid var(--border-emerald)}
.tag-pinned{background:rgba(251,191,36,.15);color:#fcd34d;border:1px solid rgba(251,191,36,.3)}
.topic-meta{font-size:12px;color:var(--text-3)}
.topic-meta strong{color:var(--emerald-400);font-weight:500}
.topic-stats{display:flex;gap:18px;font-size:12px;color:var(--text-2)}
.topic-stats div{text-align:center}
.topic-stats .n{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text-0);font-size:15px;display:block}
.sidebar{display:flex;flex-direction:column;gap:20px}
.widget{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.widget h3{font-size:14px;font-weight:700;color:var(--text-0);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.widget h3::before{content:"";width:3px;height:14px;background:var(--emerald-500);border-radius:2px}
.online-users{display:flex;flex-direction:column;gap:12px}
.user-row{display:flex;align-items:center;gap:10px;font-size:13px}
.user-row .avatar{width:32px;height:32px;font-size:12px}
.user-row .name{color:var(--text-0);font-weight:500}
.user-row .role{font-size:11px;color:var(--emerald-400)}
.user-row .status{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--emerald-400);box-shadow:0 0 8px var(--emerald-400)}
.rules{list-style:none;display:flex;flex-direction:column;gap:10px}
.rules li{font-size:13px;color:var(--text-2);padding-left:20px;position:relative}
.rules li::before{content:"▸";position:absolute;left:0;color:var(--emerald-400)}
.tags-cloud{display:flex;flex-wrap:wrap;gap:8px}
.tag-cloud{padding:5px 11px;border-radius:6px;background:var(--bg-2);border:1px solid var(--border);font-size:12px;color:var(--text-1);cursor:pointer}
.tag-cloud:hover{border-color:var(--emerald-500);color:var(--emerald-400)}
footer{border-top:1px solid var(--border);background:var(--bg-1);padding:40px 24px 24px}
.footer-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:32px}
.footer-brand p{font-size:13px;color:var(--text-2);margin-top:12px;max-width:320px}
.footer-col h4{font-size:13px;font-weight:700;color:var(--text-0);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.footer-col a{font-size:13px;color:var(--text-2)}
.footer-col a:hover{color:var(--emerald-400)}
.footer-bottom{max-width:1280px;margin:0 auto;padding-top:20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);flex-wrap:wrap;gap:12px}
.auth-container{min-height:calc(100vh - 73px);display:grid;place-items:center;padding:40px 20px}
.auth-card{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:440px}
.auth-header{text-align:center;margin-bottom:32px}
.auth-header h1{font-size:28px;font-weight:700;color:var(--text-0);margin-bottom:8px}
.auth-header p{color:var(--text-2);font-size:14px}
.auth-tabs{display:flex;gap:4px;background:var(--bg-2);padding:4px;border-radius:10px;margin-bottom:24px}
.auth-tab{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;color:var(--text-2);cursor:pointer}
.auth-tab.active{background:var(--bg-1);color:var(--emerald-400)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-1);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;color:var(--text-0);font-size:14px;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--emerald-500);box-shadow:0 0 0 3px rgba(16,185,129,.15)}
.form-group textarea{min-height:150px;resize:vertical}
.btn-auth{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:12px;cursor:pointer}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--text-3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.social-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-social{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;color:var(--text-1);cursor:pointer}
.btn-social:hover{border-color:var(--emerald-500);transform:translateY(-1px)}
.btn-social svg{width:18px;height:18px}
.auth-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--text-2)}
.auth-footer a{color:var(--emerald-400);font-weight:600}
.form-container{display:none}.form-container.active{display:block}
.alert{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:13px;display:none}
.alert.show{display:block}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.alert-success{background:rgba(16,185,129,.1);border:1px solid var(--border-emerald);color:var(--emerald-400)}
.dashboard-container{max-width:1200px;margin:0 auto;padding:40px 24px}
.dashboard-header{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:24px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.dashboard-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--emerald-500),var(--emerald-700));display:grid;place-items:center;font-size:32px;font-weight:700;color:#fff}
.dashboard-info h1{font-size:28px;font-weight:700;color:var(--text-0);margin-bottom:4px}
.dashboard-info p{color:var(--text-2);font-size:14px}
.dashboard-stats{display:flex;gap:32px;margin-left:auto;flex-wrap:wrap}
.dashboard-stat{text-align:center}
.dashboard-stat-value{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--emerald-400)}
.dashboard-stat-label{font-size:12px;color:var(--text-2);margin-top:4px}
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.dashboard-card{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:24px}
.dashboard-card h2{font-size:18px;font-weight:700;color:var(--text-0);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.dashboard-card h2::before{content:"";width:4px;height:18px;background:var(--emerald-500);border-radius:2px}
.activity-list{display:flex;flex-direction:column;gap:12px}
.activity-item{padding:12px;background:var(--bg-2);border-radius:10px;font-size:14px;color:var(--text-1)}
.activity-item strong{color:var(--emerald-400)}
.btn-logout{padding:10px 20px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:10px;color:#fca5a5;font-size:14px;font-weight:600;cursor:pointer}
.btn-logout:hover{background:rgba(239,68,68,.25)}
.mod-container{max-width:1400px;margin:0 auto;padding:40px 24px}
.mod-header{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(5,150,105,.05));border:1px solid var(--border-emerald);border-radius:16px;padding:32px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.mod-header h1{font-size:28px;font-weight:700;color:var(--text-0);display:flex;align-items:center;gap:12px}
.mod-header h1::before{content:'🛡️';font-size:32px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card-value{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:var(--emerald-400)}
.stat-card-label{font-size:13px;color:var(--text-2);margin-top:4px}
.mod-tabs{display:flex;gap:4px;background:var(--bg-1);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;flex-wrap:wrap}
.mod-tab{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;color:var(--text-2);cursor:pointer;min-width:150px}
.mod-tab.active{background:var(--bg-2);color:var(--emerald-400)}
.mod-content{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:24px}
.content-section{display:none}.content-section.active{display:block}
.log-item{padding:16px;background:var(--bg-2);border-radius:10px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.log-icon{width:40px;height:40px;border-radius:10px;background:rgba(16,185,129,.15);display:grid;place-items:center;font-size:18px}
.log-info{flex:1;min-width:200px}
.log-info strong{color:var(--text-0);font-size:14px}
.log-info p{color:var(--text-2);font-size:13px;margin-top:2px}
.log-time{font-size:12px;color:var(--text-3)}
.btn-mod{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-left:8px}
.btn-edit{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd}
.btn-delete{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.user-manage-item{padding:16px;background:var(--bg-2);border-radius:10px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.user-manage-info{flex:1;min-width:200px}
.user-manage-info strong{color:var(--text-0);display:block;margin-bottom:4px}
.user-manage-info span{font-size:12px;color:var(--text-2)}
.role-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase}
.role-admin{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.role-mod{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.role-member{background:rgba(16,185,129,.15);color:var(--emerald-400);border:1px solid var(--border-emerald)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;padding:20px;overflow-y:auto}
.modal.show{display:grid;place-items:center}
.modal-content{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-header h2{font-size:22px;font-weight:700;color:var(--text-0)}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--bg-2);display:grid;place-items:center;cursor:pointer;color:var(--text-1);font-size:18px}
.cookie-banner{position:fixed;bottom:20px;left:20px;right:20px;max-width:900px;margin:0 auto;background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:9999;display:none}
.cookie-banner.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.cookie-content{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.cookie-text h3{color:var(--text-0);font-size:18px;margin-bottom:8px}
.cookie-text p{color:var(--text-2);font-size:14px;line-height:1.5}
.cookie-text a{color:var(--emerald-400)}
.cookie-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-cookie{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-accept{background:linear-gradient(135deg,var(--emerald-500),var(--emerald-600));color:#021a11}
.btn-reject{background:var(--bg-2);color:var(--text-1);border:1px solid var(--border)}
@media (max-width:960px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.footer-inner{grid-template-columns:1fr 1fr}.nav-links,.search{display:none}.dashboard-grid{grid-template-columns:1fr}}
@media (max-width:640px){.category{grid-template-columns:auto 1fr}.cat-stats{display:none}.topic{grid-template-columns:auto 1fr}.topic-stats{display:none}.footer-inner{grid-template-columns:1fr}.hero{padding:40px 20px 24px}.cookie-content{grid-template-columns:1fr}.dashboard-header{flex-direction:column;text-align:center}.dashboard-stats{margin-left:0;justify-content:center}}
</style>
</head>
<body>

<header>
  <nav class="nav">
    <div class="logo" onclick="navigate('home')">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#021a11" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      Eng<span>Forum</span>
    </div>
    <ul class="nav-links">
      <li><a onclick="navigate('home')" class="active">Início</a></li>
      <li><a onclick="scrollTo('categorias')">Categorias</a></li>
      <li><a onclick="scrollTo('topicos')">Discussões</a></li>
    </ul>
    <div class="nav-actions">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
